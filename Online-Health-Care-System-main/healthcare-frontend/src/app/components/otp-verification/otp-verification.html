<div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-white rounded-lg shadow-lg p-8">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-gray-900 mb-2">Verify Your Email</h2>
      <p class="text-gray-600">We've sent a 6-digit OTP to</p>
      <p class="text-gray-800 font-medium">{{ email }}</p>
    </div>

    <form (ngSubmit)="verifyOtp()" class="space-y-6">
      <div>
        <label for="otp" class="block text-sm font-medium text-gray-700 mb-2">
          Enter OTP
        </label>
        <input
          type="text"
          id="otp"
          [(ngModel)]="otp"
          name="otp"
          maxlength="6"
          pattern="[0-9]{6}"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-center text-2xl font-mono tracking-widest"
          placeholder="000000"
          required
          (input)="onOtpInput($event)"
        />
      </div>

      <button
        type="submit"
        [disabled]="loading"
        class="w-full bg-blue-600 text-white py-3 px-4 rounded-lg hover:bg-blue-700 focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
      >
        <span *ngIf="loading" class="inline-block animate-spin rounded-full h-4 w-4 border-b-2 border-white mr-2"></span>
        {{ loading ? 'Verifying...' : 'Verify OTP' }}
      </button>
    </form>

    <div class="mt-6 text-center">
      <button
        (click)="resendOtp()"
        [disabled]="resendLoading"
        class="text-blue-600 hover:text-blue-800 font-medium disabled:opacity-50 disabled:cursor-not-allowed"
      >
        {{ resendLoading ? 'Sending...' : 'Resend OTP' }}
      </button>
    </div>

    <div *ngIf="errorMessage" class="mt-4 p-4 bg-red-50 border border-red-200 rounded-lg">
      <p class="text-red-700 text-sm">{{ errorMessage }}</p>
    </div>

    <div *ngIf="successMessage" class="mt-4 p-4 bg-green-50 border border-green-200 rounded-lg">
      <p class="text-green-700 text-sm">{{ successMessage }}</p>
    </div>
  </div>
</div>
