    <div class="flex justify-between items-center">

      <div class="flex items-center gap-3 cursor-pointer group" routerLink="/home">
        <div class="bg-gradient-to-r from-blue-500 to-purple-600 text-white p-2 rounded-lg shadow-md group-hover:scale-110 transition">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">

      <div class="hidden md:flex items-center gap-6">
        <ng-container *ngIf="!isAuthenticated()">
          <a routerLink="/login" class="text-gray-700 dark:text-gray-300 hover:text-blue-600 transition font-medium">Login</a>
          <a routerLink="/signup-user" class="px-4 py-2 rounded-lg bg-gradient-to-r from-blue-500 to-purple-600 text-white font-semibold shadow-md hover:scale-105 hover:shadow-lg transition">Get Started</a>

        <ng-container *ngIf="isAuthenticated()">
          <div class="flex items-center gap-4">
            <div class="text-right">
              <p class="text-gray-900 dark:text-white font-semibold text-sm">{{ getCurrentUser()?.username }}</p>
              <p class="text-gray-600 dark:text-gray-400 text-xs">{{ getRole() }}</p>

            <button
              (click)="logout()"
              class="px-4 py-2 rounded-lg bg-red-50 hover:bg-red-100 text-red-600 font-medium transition"
            >

            </button>

      <div class="md:hidden flex items-center gap-3">
        <button
          (click)="toggleTheme()"
          class="p-2 rounded-full bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 transition"
        >
          <svg *ngIf="!theme.isDarkMode()" class="w-5 h-5 text-gray-800" fill="currentColor" viewBox="0 0 20 20">
            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
          </svg>
          <svg *ngIf="theme.isDarkMode()" class="w-5 h-5 text-yellow-400" fill="currentColor" viewBox="0 0 20 20">

        <button
          (click)="toggleMenu()"
          class="p-2 rounded-lg bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 transition"
        >
          <svg *ngIf="!isMenuOpen" class="w-6 h-6 text-gray-800 dark:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
          </svg>
          <svg *ngIf="isMenuOpen" class="w-6 h-6 text-gray-800 dark:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>
    </div>

    <!-- Mobile Menu -->
    <div *ngIf="isMenuOpen" class="md:hidden mt-4 pb-4 border-t border-gray-200 dark:border-gray-700 pt-4">
      <ng-container *ngIf="!isAuthenticated()">
        <a routerLink="/login" class="block py-2 text-gray-700 dark:text-gray-300 hover:text-blue-600 transition" (click)="toggleMenu()">Login</a>
        <a routerLink="/signup-user" class="block py-2 text-gray-700 dark:text-gray-300 hover:text-blue-600 transition" (click)="toggleMenu()">Get Started</a>
      </ng-container>

      <ng-container *ngIf="isAuthenticated()">
        <p class="py-2 text-gray-900 dark:text-white font-semibold">{{ getCurrentUser()?.username }}</p>
        <p class="py-2 text-gray-600 dark:text-gray-400 text-sm">{{ getRole() }}</p>
        <button
          (click)="logout()"
          class="w-full mt-4 px-4 py-2 rounded-lg bg-red-50 hover:bg-red-100 text-red-600 font-medium transition"

          Logout
